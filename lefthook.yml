pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{ts,tsx}"
      run: npx eslint {staged_files} --max-warnings 0

    - name: format-check
      glob: "*.{ts,tsx,json,css,md}"
      run: npx prettier --check {staged_files}

pre-push:
  jobs:
    - name: tests
      run: npm test

commit-msg:
  jobs:
    - name: conventional-commit
      run: 'grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?:" {1} || (echo "Bad commit format. Use type(scope) subject" && exit 1)'
